fallbacks:
  bocha: [anysearch, web_search]
  exa: [tavily, anysearch, web_search]
  tavily: [anysearch, web_search]
  anysearch: [web_search]

error_classes:
  quota:
    - api key
    - quota
    - exhausted
    - limit
    - rate
    - "401"
    - "402"
    - "403"
    - "429"
  network:
    - timeout
    - timed out
    - network
    - request failed
    - urlopen
    - connection
